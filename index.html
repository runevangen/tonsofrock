    async function buildBandCounts() {
      bandFavCounts = {};
      try {
        const users = await fetchAllUsers();
        allUsers = users;
        autoFriendMode = users.length < AUTO_VENNER_UNDER;
        // Hvem teller som "venn" for visning:
        const friendSet = autoFriendMode
          ? new Set(users.map(u => u.name))   // alle er venner
          : new Set(myFriends);               // bare valgte venner
        for (const u of users) {
          if (u.name === currentUser) { /* ikke vis deg selv som "venn" */ }
          const data = await fetchCloudFavorites(u.name);
          (data.favorites || []).forEach(band => {
            if (!bandFavCounts[band]) bandFavCounts[band] = { total: 0, friends: [] };
            bandFavCounts[band].total++;
            if (u.name !== currentUser && friendSet.has(u.name)) {
              bandFavCounts[band].friends.push(u.name);
            }
          });
        }
        // Advarsel når vi nettopp passerte grensen (16+ brukere)
        if (!autoFriendMode && users.length >= AUTO_VENNER_UNDER && !capWarningShown) {
          capWarningShown = true;
          showCapWarning(users.length);
        }
      } catch (e) { /* nett nede — ingen tellinger, kort vises rene */ }
    }

    // Henter lignende artister fra Last.fm (ekte lyttedata)
    async function fetchSimilarArtists(bandName) {
      const url = `https://ws.audioscrobbler.com/2.0/?method=artist.getsimilar&artist=${encodeURIComponent(bandName)}&api_key=${LASTFM_API_KEY}&autocorrect=1&limit=12&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Last.fm svarte ikke (' + res.status + ')');
      const data = await res.json();
      if (data.error) throw new Error(data.message || 'Last.fm-feil');
      const list = (data.similarartists && data.similarartists.artist) || [];
      return list.map(a => ({ name: a.name, match: parseFloat(a.match) || 0 }));
    }

    // ===== INITIALER (med duplikathåndtering RV1/RV2) =====
    function computeInitials(names) {
      // names = liste med brukernavn → { navn: "RV" / "RV1" }
      const raw = {};
      names.forEach(n => {
        const parts = n.trim().split(/\s+/);
        let init;
        if (parts.length >= 2) init = (parts[0][0] + parts[1][0]).toUpperCase();
        else init = n.slice(0, 2).toUpperCase();
        raw[n] = init;
      });
      // Finn duplikater og legg på nummer
      const counts = {};
      Object.values(raw).forEach(i => counts[i] = (counts[i] || 0) + 1);
      const seen = {};
      const result = {};
      names.forEach(n => {
        const i = raw[n];
        if (counts[i] > 1) { seen[i] = (seen[i] || 0) + 1; result[n] = i + seen[i]; }
        else result[n] = i;
      });
      return result;
    }
    function colorClass(name) {
      // Stabil farge per navn (hash)
      let h = 0;
      for (let c of name) h = (h * 31 + c.charCodeAt(0)) % 6;
      return 'c' + h;
    }

    function renderAdminPanel(modal, password, users) {
      const content = modal.querySelector('.modal-content');
      const fmtDate = (d) => d ? new Date(d).toLocaleDateString('no-NO') : '–';
      const items = users.map(u => `
        <label class="pick-item">
          <input type="checkbox" value="${u.name}">
          <span class="pname">${u.name}</span>
          <span class="pmeta">${u.count} fav · ${fmtDate(u.updated)}</span>
        </label>`).join('');
      content.innerHTML = `
        <div class="warn-box">⚠️ Sletting kan ikke angres</div>
        ${items || '<p style="color:#a1a1aa;">Ingen brukere.</p>'}
        <div class="admin-bar">
          <button class="modal-btn secondary" id="markAll" style="margin-top:0;">Merk alle</button>
          <button class="modal-btn danger" id="delSelected" style="margin-top:0;">Slett valgte (0)</button>
        </div>
        <div id="adminResult"></div>
      `;
      const checks = () => [...content.querySelectorAll('input[type=checkbox]')];
      const delBtn = content.querySelector('#delSelected');
      const updateCount = () => { delBtn.textContent = `Slett valgte (${checks().filter(c => c.checked).length})`; };
      checks().forEach(c => c.addEventListener('change', updateCount));
      content.querySelector('#markAll').addEventListener('click', () => {
        const allChecked = checks().every(c => c.checked);
        checks().forEach(c => c.checked = !allChecked);
        updateCount();
      });
      delBtn.addEventListener('click', async () => {
        const selected = checks().filter(c => c.checked).map(c => c.value);
        if (selected.length === 0) return;
        if (!confirm(`Slette ${selected.length} bruker(e)? Kan ikke angres.`)) return;
        content.querySelector('#adminResult').innerHTML = '<div class="modal-status info">Sletter…</div>';
        try {
          const res = await fetch('/api/admin-delete', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password, users: selected })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Feil');
          const remaining = await fetchAllUsers();
          renderAdminPanel(modal, password, remaining);
          modal.querySelector('#adminResult').innerHTML = `<div class="modal-status info">Slettet ${data.deleted} bruker(e).</div>`;
        } catch (e) {
          content.querySelector('#adminResult').innerHTML = `<div class="modal-status warn">Feil: ${e.message}</div>`;
        }
      });
    }

    // ===== OPPSTART =====
    async function startup() {
      renderUserBar();
      render();
      const saved = getStoredUser();
      if (saved) {
        // Husker deg fra sist — logg automatisk på
        try {
          await loginUser(saved);
          renderUserBar(); render();
          if (showFriendsOnCards) { await buildBandCounts(); render(); }
        }
        catch (e) { startLocalMode(); renderUserBar(); }
      } else {
        // Første gang — vis innloggingsvalg (appen funker lokalt uansett)
        showLoginModal();
      }
    }

    startup();
  </script>
</body>
</html>
