# Netlify-konfigurasjon for Tons of Rock flerbrukerversjon

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Pene URL-er som alle peker til samme funksjon
[[redirects]]
  from = "/api/favorites"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/api/admin-delete"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/api/positions"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/api/position"
  to = "/.netlify/functions/favorites"
  status = 200
